{% extends "base.html" %}
{% block title %}Editar Personal{% endblock %}
{% block content %}
<h2>✏️ Editar empleado</h2>
<form method="POST">
    <div class="row">
        <div class="col-md-6 mb-3">
            <label class="form-label">Nombre</label>
            <input type="text" name="nombre" value="{{ personal.Nombre }}" class="form-control" required>
        </div>
        <div class="col-md-6 mb-3">
            <label class="form-label">Apellido</label>
            <input type="text" name="apellido" value="{{ personal.Apellido }}" class="form-control" required>
        </div>
        <div class="col-md-6 mb-3">
            <label class="form-label">Teléfono</label>
            <input type="text" name="telefono" value="{{ personal.Telefono }}" class="form-control">
        </div>
        <div class="col-md-6 mb-3">
            <label class="form-label">Dirección</label>
            <input type="text" name="direccion" value="{{ personal.Direccion }}" class="form-control">
        </div>
        <div class="col-md-6 mb-3">
            <label class="form-label">Edad</label>
            <input type="number" name="edad" value="{{ personal.Edad }}" class="form-control">
        </div>
        <div class="col-md-6 mb-3">
            <label class="form-label">Seguro</label>
            <input type="text" name="seguro" value="{{ personal.Seguro }}" class="form-control">
        </div>
        <div class="col-md-6 mb-3">
            <label class="form-label">Salario</label>
            <input type="number" step="0.01" name="salario" value="{{ personal.Salario }}" class="form-control" required>
        </div>
        <div class="col-md-6 mb-3">
            <label class="form-label">Fecha contratación</label>
            <input type="date" name="fecha_contratacion" value="{{ personal.Fecha_Contratacion }}" class="form-control" required>
        </div>
    </div>
    <button type="submit" class="btn btn-primary">Actualizar</button>
    <a href="{{ url_for('personal') }}" class="btn btn-secondary">Cancelar</a>
</form>
{% endblock %}
