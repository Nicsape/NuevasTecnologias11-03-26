{% extends "base.html" %}
{% block title %}Registro de usuario{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <h2 class="mb-4">Registro de nuevo usuario</h2>
        <form id="registerForm">
            <div class="row">
                <div class="col-md-6 mb-3"><label>Nombre</label><input type="text" id="nombre" class="form-control" required></div>
                <div class="col-md-6 mb-3"><label>Apellido</label><input type="text" id="apellido" class="form-control" required></div>
                <div class="col-md-6 mb-3"><label>Email</label><input type="email" id="email" class="form-control" required></div>
                <div class="col-md-6 mb-3"><label>Usuario</label><input type="text" id="username" class="form-control" required></div>
                <div class="col-md-6 mb-3"><label>Contraseña</label><input type="password" id="password" class="form-control" required></div>
                <div class="col-md-6 mb-3"><label>Teléfono</label><input type="text" id="telefono" class="form-control"></div>
                <div class="col-md-6 mb-3"><label>Dirección</label><input type="text" id="direccion" class="form-control"></div>
                <div class="col-md-6 mb-3"><label>Edad</label><input type="number" id="edad" class="form-control"></div>
                <div class="col-md-6 mb-3"><label>Seguro</label><input type="text" id="seguro" class="form-control"></div>
            </div>
            <button type="submit" class="btn btn-success">Registrarse</button>
        </form>
        <div id="msg" class="mt-3"></div>
    </div>
</div>
<script>
    document.getElementById('registerForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const data = {
            nombre: document.getElementById('nombre').value,
            apellido: document.getElementById('apellido').value,
            email: document.getElementById('email').value,
            username: document.getElementById('username').value,
            password: document.getElementById('password').value,
            telefono: document.getElementById('telefono').value,
            direccion: document.getElementById('direccion').value,
            edad: parseInt(document.getElementById('edad').value),
            seguro: document.getElementById('seguro').value
        };
        const response = await fetch('/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });
        const result = await response.json();
        const msgDiv = document.getElementById('msg');
        if (response.ok) {
            msgDiv.innerHTML = '<div class="alert alert-success">Registro exitoso. Ahora puede <a href="/login_page">iniciar sesión</a></div>';
            this.reset();
        } else {
            msgDiv.innerHTML = `<div class="alert alert-danger">${result.msg}</div>`;
        }
    });
</script>
{% endblock %}
