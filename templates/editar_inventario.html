{% extends "base.html" %}
{% block title %}Editar producto{% endblock %}
{% block content %}
<h2>Editar producto</h2>
<form method="POST">
    <div class="mb-3"><label>Producto</label><input type="text" name="producto" value="{{ item.Producto }}" class="form-control" required></div>
    <div class="mb-3"><label>Categoría</label><input type="text" name="categoria" value="{{ item.Categoria }}" class="form-control" required></div>
    <div class="mb-3"><label>Stock</label><input type="number" name="stock" value="{{ item.Stock }}" min="0" max="100" class="form-control" required></div>
    <div class="mb-3"><label>Precio</label><input type="number" step="0.01" name="precio" value="{{ item.Precio }}" class="form-control" required></div>
    <button type="submit" class="btn btn-primary">Actualizar</button>
    <a href="/inventario" class="btn btn-secondary">Cancelar</a>
</form>
{% endblock %}
