{% extends "base.html" %}
{% block title %}Registrar producto{% endblock %}
{% block content %}
<h2>Nuevo producto en inventario</h2>
<form method="POST">
    <div class="mb-3"><label>Producto</label><input type="text" name="producto" class="form-control" required></div>
    <div class="mb-3"><label>Categoría</label><input type="text" name="categoria" class="form-control" required></div>
    <div class="mb-3"><label>Stock</label><input type="number" name="stock" min="0" max="100" class="form-control" required></div>
    <div class="mb-3"><label>Precio</label><input type="number" step="0.01" name="precio" class="form-control" required></div>
    <button type="submit" class="btn btn-success">Guardar</button>
    <a href="/inventario" class="btn btn-secondary">Cancelar</a>
</form>
{% endblock %}
