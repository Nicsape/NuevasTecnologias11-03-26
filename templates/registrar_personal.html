{% extends "base.html" %}
{% block title %}Registrar Personal{% endblock %}
{% block content %}
<h2>📝 Registrar nuevo empleado</h2>
<form method="POST">
    <div class="row">
        <div class="col-md-6 mb-3">
            <label class="form-label">Nombre</label>
            <input type="text" name="nombre" class="form-control" required>
        </div>
        <div class="col-md-6 mb-3">
            <label class="form-label">Apellido</label>
            <input type="text" name="apellido" class="form-control" required>
        </div>
        <div class="col-md-6 mb-3">
            <label class="form-label">Email</label>
            <input type="email" name="email" class="form-control" required>
        </div>
        <div class="col-md-6 mb-3">
            <label class="form-label">Nombre de usuario</label>
            <input type="text" name="username" class="form-control" required>
        </div>
        <div class="col-md-6 mb-3">
            <label class="form-label">Contraseña</label>
            <input type="password" name="password" class="form-control" required>
        </div>
        <div class="col-md-6 mb-3">
            <label class="form-label">Rol</label>
            <select name="rol" class="form-control" required>
                <option value="ENTRENADOR">Entrenador</option>
                <option value="RECEPCIONISTA">Recepcionista</option>
                <option value="ADMIN">Administrador</option>
            </select>
        </div>
        <div class="col-md-6 mb-3">
            <label class="form-label">Salario</label>
            <input type="number" step="0.01" name="salario" class="form-control" required>
        </div>
        <div class="col-md-6 mb-3">
            <label class="form-label">Fecha contratación</label>
            <input type="date" name="fecha_contratacion" class="form-control" required>
        </div>
        <div class="col-md-6 mb-3">
            <label class="form-label">Teléfono</label>
            <input type="text" name="telefono" class="form-control">
        </div>
        <div class="col-md-6 mb-3">
            <label class="form-label">Dirección</label>
            <input type="text" name="direccion" class="form-control">
        </div>
        <div class="col-md-6 mb-3">
            <label class="form-label">Edad</label>
            <input type="number" name="edad" class="form-control">
        </div>
        <div class="col-md-6 mb-3">
            <label class="form-label">Seguro</label>
            <input type="text" name="seguro" class="form-control">
        </div>
    </div>
    <button type="submit" class="btn btn-success">Guardar</button>
    <a href="{{ url_for('personal') }}" class="btn btn-secondary">Cancelar</a>
</form>
{% endblock %}
